worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # HTTP → HTTPS redirect
    server {
        listen 48920;
        server_name _;
        return 301 https://$host:48921$request_uri;
    }

    server {
        listen 48921 ssl;
        server_name _;

        ssl_certificate     /etc/ssl/minipacs/cert.pem;
        ssl_certificate_key /etc/ssl/minipacs/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        client_max_body_size 10M;

        # Security headers
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://www.google.com https://*.gstatic.com; font-src 'self' data:; connect-src 'self'; frame-src 'self'; media-src 'self'; object-src 'none';" always;

        # React frontend (built)
        location / {
            root /Users/timur/projectos/minipacs/frontend/dist;
            try_files $uri $uri/ /index.html;
        }

        # FastAPI backend
        location /api/ {
            proxy_pass http://127.0.0.1:48922;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Orthanc DICOMweb — restricted to clinic LAN only
        location /dicom-web/ {
            allow 127.0.0.1;
            allow ::1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;

            proxy_pass http://127.0.0.1:48923/dicom-web/;
            proxy_set_header Host $host;
            proxy_set_header Authorization "Basic $ORTHANC_BASIC_AUTH";
            proxy_read_timeout 300s;
        }

        # OHIF Viewer (static files)
        location /ohif/ {
            alias /Users/timur/projectos/minipacs/ohif-dist/;
            try_files $uri $uri/ /ohif/index.html;
        }
    }
}
