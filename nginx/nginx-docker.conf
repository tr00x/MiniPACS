worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # HTTP -> HTTPS redirect
    server {
        listen 80;
        server_name _;
        return 301 https://$host:${HTTPS_PORT}$request_uri;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/ssl/minipacs/cert.pem;
        ssl_certificate_key /etc/ssl/minipacs/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        client_max_body_size 10M;

        # Internal endpoint hit by every viewer auth_request — JWT-only, no DB.
        location = /__auth_verify_viewer {
            internal;
            proxy_pass              http://backend:8000/api/auth/verify-viewer;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length "";
            proxy_set_header        Host $host;
            proxy_set_header        Cookie $http_cookie;
        }

        # Security headers
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://www.google.com https://*.gstatic.com; font-src 'self' data:; connect-src 'self' https://cloudflareinsights.com; frame-src 'self'; media-src 'self'; object-src 'none';" always;

        # Service worker — stable filename means browsers MUST re-validate on
        # every load or updates never ship. CDN-Cache-Control is a separate
        # header Cloudflare honours regardless of Page/Cache Rules rewriting
        # the generic Cache-Control header, so it survives even when CF is
        # overriding origin caching for the rest of the site.
        location = /sw.js {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header CDN-Cache-Control "no-store" always;
            add_header Cloudflare-CDN-Cache-Control "no-store" always;
            add_header Service-Worker-Allowed "/" always;
            default_type application/javascript;
        }
        location = /registerSW.js {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header CDN-Cache-Control "no-store" always;
            add_header Cloudflare-CDN-Cache-Control "no-store" always;
            default_type application/javascript;
        }
        # Web app manifest — explicit MIME, short cache.
        location = /manifest.webmanifest {
            root /usr/share/nginx/html;
            add_header Cache-Control "public, max-age=3600" always;
            default_type application/manifest+json;
        }
        # Workbox runtime helper — hash-suffixed, safe to cache forever.
        location ~* ^/workbox-[a-f0-9]+\.js(\.gz)?$ {
            root /usr/share/nginx/html;
            access_log off;
            expires 1y;
            add_header Cache-Control "public, immutable, max-age=31536000" always;
        }

        # React frontend
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # Live-worklist WebSocket (precedes /api/ for Upgrade handling).
        location /api/ws/ {
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Burn-ISO export builds a 15 MB - 4 GB ISO (10-60s build window) then streams it.
        # Disable buffering so bytes flow to the client as soon as the StreamingResponse
        # starts; bump timeouts to cover worst-case build window on a large study.
        location ~* ^/api/studies/[a-fA-F0-9-]+/burn-iso$ {
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_read_timeout 1800s;
            proxy_send_timeout 1800s;
        }

        # FastAPI backend
        location /api/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            # /api/studies?include=thumbs returns up to ~2 MB of base64 PNGs;
            # bump buffers so the response stays in RAM instead of spilling
            # to /var/cache/nginx/proxy_temp on disk.
            proxy_buffer_size 64k;
            proxy_buffers 32 64k;
            proxy_busy_buffers_size 128k;
        }

        # Orthanc DICOMweb
        # STOW-RS (POST multipart) can carry several-GB studies on bulk
        # imports; mirror the prod /orthanc/ override so the dev stack
        # doesn't 413 a real-world archive that prod accepts.
        location /dicom-web/ {
            auth_request /__auth_verify_viewer;
            client_max_body_size 5G;
            proxy_pass http://orthanc:8042/dicom-web/;
            proxy_set_header Host $host;
            proxy_set_header Authorization "Basic ${ORTHANC_BASIC_AUTH}";
            proxy_read_timeout 300s;
        }

        # Stone "Download study" needs root-path Orthanc API access.
        location = /tools/lookup {
            auth_request /__auth_verify_viewer;
            proxy_pass http://orthanc:8042/tools/lookup;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Authorization "Basic ${ORTHANC_BASIC_AUTH}";
            proxy_read_timeout 60s;
        }

        location ~* ^/studies/[a-fA-F0-9-]+/(archive|media)$ {
            auth_request /__auth_verify_viewer;
            client_max_body_size 5G;
            proxy_pass http://orthanc:8042$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Authorization "Basic ${ORTHANC_BASIC_AUTH}";
            proxy_buffering off;
            proxy_read_timeout 1800s;
            proxy_send_timeout 1800s;
        }

        # OHIF Viewer — Orthanc OHIF plugin (see nginx-prod.conf comment).
        location /ohif/ {
            auth_request /__auth_verify_viewer;
            proxy_pass http://orthanc:8042/ohif/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header Authorization "Basic ${ORTHANC_BASIC_AUTH}";
            proxy_read_timeout 300s;
        }
    }
}
