worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # HTTP -> HTTPS redirect
    server {
        listen 80;
        server_name _;
        return 301 https://$host:${HTTPS_PORT}$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/ssl/minipacs/cert.pem;
        ssl_certificate_key /etc/ssl/minipacs/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        client_max_body_size 500M;

        # Security headers
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://www.google.com https://*.gstatic.com; font-src 'self' data:; connect-src 'self'; frame-src 'self'; media-src 'self'; object-src 'none';" always;

        # React frontend
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # FastAPI backend
        location /api/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Orthanc DICOMweb
        location /dicom-web/ {
            proxy_pass http://orthanc:8042/dicom-web/;
            proxy_set_header Host $host;
            proxy_set_header Authorization "Basic ${ORTHANC_BASIC_AUTH}";
            proxy_read_timeout 300s;
        }

        # OHIF Viewer — Orthanc OHIF plugin (see nginx-prod.conf comment).
        location /ohif/ {
            proxy_pass http://orthanc:8042/ohif/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Authorization "Basic ${ORTHANC_BASIC_AUTH}";
            proxy_read_timeout 300s;
        }
    }
}
