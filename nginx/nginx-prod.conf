worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name _;

        client_max_body_size 500M;

        # Security headers
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://www.google.com; font-src 'self' data:; connect-src 'self'; frame-src 'self'; media-src 'self'; object-src 'none';" always;

        # React frontend
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # FastAPI backend
        location /api/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Orthanc DICOMweb
        location /dicom-web/ {
            proxy_pass http://orthanc:8042/dicom-web/;
            proxy_set_header Host $host;
            proxy_set_header Authorization "Basic ${ORTHANC_BASIC_AUTH}";
            proxy_read_timeout 300s;
        }

        # OHIF Viewer
        location /ohif/ {
            alias /usr/share/nginx/ohif/;
            try_files $uri $uri/ /ohif/index.html;
        }
    }
}
