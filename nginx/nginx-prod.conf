worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 65;
    keepalive_requests 200;

    # Persistent upstream connections — without this nginx opens a fresh TCP
    # socket to Orthanc/backend for every request, adding ~1 RTT per call. OHIF
    # fires ~200 DICOMweb metadata requests per study; re-using sockets cuts
    # total latency substantially.
    upstream orthanc_upstream {
        server orthanc:8042;
        keepalive 32;
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }
    upstream backend_upstream {
        server backend:8000;
        keepalive 16;
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }

    # nginx-level disk cache for Orthanc DICOMweb metadata + frames. A series's
    # metadata only changes when new instances arrive in that series; a WADO-RS
    # frame never changes (SOP Instance UID is immutable). 2 GB budget shared
    # across the cache — plenty for "hot set" while a radiologist works through
    # a worklist.
    proxy_cache_path /var/cache/nginx/dicomweb levels=1:2 keys_zone=dicomweb:50m
                     max_size=2g inactive=7d use_temp_path=off;

    # Compression — gzip_static serves pre-compressed .gz files produced by the
    # frontend build (vite-plugin-compression). Falls back to on-the-fly gzip
    # for dynamic responses.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        application/javascript application/json application/xml
        text/css text/javascript text/plain text/xml
        image/svg+xml font/woff font/woff2;
    gzip_static on;

    server {
        # Port 80 is what the Cloudflare Tunnel connector speaks to (CF terminates
        # TLS edge-side, origin stays HTTP — 0 extra RTT on the trusted link).
        listen 80;
        # Port 443 is for LAN clients reaching this box directly via split-horizon
        # DNS (pacs.your-clinic.example → clinic LAN IP). HTTP/2 multiplexes Stone's
        # DICOMweb metadata + frame bursts over a single TLS connection, which
        # is a visible win on 500-slice MRs. The cert is a Cloudflare Origin
        # Certificate (TTL 15y) mounted at /etc/ssl/minipacs — falls back to a
        # self-signed pair baked in the image so the listener always comes up.
        listen 443 ssl;
        http2 on;
        ssl_certificate     /etc/ssl/minipacs/cert.pem;
        ssl_certificate_key /etc/ssl/minipacs/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305";
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        server_name _;

        client_max_body_size 500M;

        # HTTP→HTTPS redirect, but only for direct LAN clients. Cloudflare Tunnel
        # terminates TLS at edge and tunnels HTTP here with X-Forwarded-Proto: https
        # — those must NOT be redirected (would cause an infinite loop CF→origin→
        # 301→CF→origin…). $scheme is "http" on both port 80 and the CF leg, so we
        # also gate on the X-Forwarded-Proto header.
        set $needs_https 0;
        if ($scheme = http)                  { set $needs_https 1; }
        if ($http_x_forwarded_proto = https) { set $needs_https 0; }
        if ($needs_https = 1)                { return 301 https://$host$request_uri; }

        # Custom error pages — friendly fall-throughs instead of nginx defaults.
        # SPA gets a clean React NotFoundPage for unknown frontend routes (the
        # try_files in `location /` already routes those to /index.html, so this
        # 404 page is only reached for genuine non-SPA misses like /assets/old.js).
        error_page 502 503 504 /index.html;

        # Internal endpoint hit by every auth_request below. Cookie passes through
        # automatically; body stripped (auth check needs none). Backend handler
        # is JWT-only, no DB — must stay sub-millisecond for the 200+ DICOMweb
        # subrequests fired on a single study open.
        location = /__auth_verify_viewer {
            internal;
            proxy_pass              http://backend_upstream/api/auth/verify-viewer;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length "";
            proxy_set_header        Host $host;
            proxy_set_header        Cookie $http_cookie;
        }

        # Security headers
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://www.google.com https://*.gstatic.com; font-src 'self' data:; connect-src 'self'; frame-src 'self'; media-src 'self'; object-src 'none';" always;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

        # React frontend — hashed assets immutable, index.html always revalidated.
        # Without this, a Cloudflare DYNAMIC pass-through + browser heuristic
        # can keep stale index.html pointing at a dead bundle hash after a rebuild.
        location = /index.html {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
        }

        location /assets/ {
            root /usr/share/nginx/html;
            access_log off;
            expires 1y;
            add_header Cache-Control "public, immutable, max-age=31536000" always;
            try_files $uri =404;
        }

        # Service worker. Filename is stable (no hash), so browsers MUST
        # re-validate on every page load — otherwise SW updates never ship.
        # CDN-Cache-Control is honoured by Cloudflare regardless of Page
        # / Cache Rules that rewrite the generic Cache-Control header.
        location = /sw.js {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header CDN-Cache-Control "no-store" always;
            add_header Cloudflare-CDN-Cache-Control "no-store" always;
            add_header Service-Worker-Allowed "/" always;
            default_type application/javascript;
        }

        location = /registerSW.js {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header CDN-Cache-Control "no-store" always;
            add_header Cloudflare-CDN-Cache-Control "no-store" always;
            default_type application/javascript;
        }

        # Web app manifest — short cache, explicit MIME.
        location = /manifest.webmanifest {
            root /usr/share/nginx/html;
            add_header Cache-Control "public, max-age=3600" always;
            default_type application/manifest+json;
        }

        # Workbox runtime helper — hash-suffixed, safe to cache forever.
        location ~* ^/workbox-[a-f0-9]+\.js(\.gz)?$ {
            root /usr/share/nginx/html;
            access_log off;
            expires 1y;
            add_header Cache-Control "public, immutable, max-age=31536000" always;
        }

        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # Live-worklist WebSocket — must precede /api/ so the Upgrade-aware
        # block wins on /api/ws/*. CF Tunnel speaks WebSocket natively; the
        # 1h idle timeout lets a parked tab survive a lunchbreak.
        location /api/ws/ {
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # FastAPI backend — keepalive upstream for request bursts
        location /api/ {
            # Cache CORS preflight 24h so browsers stop OPTIONS-ing before every
            # /api/ call. Matters most for cross-origin paths through CF Tunnel.
            add_header Access-Control-Max-Age 86400 always;
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            # Worklist with ?include=thumbs returns up to ~2 MB of inlined
            # base64 PNGs. Default proxy_buffers (8 × 4-8k) overflow into
            # /var/cache/nginx/proxy_temp on disk, adding iowait to every
            # cold request. 32 × 64k = 2 MB in memory — covers the whole
            # response and keeps it RAM-resident.
            proxy_buffer_size 64k;
            proxy_buffers 32 64k;
            proxy_busy_buffers_size 128k;
        }

        # Orthanc DICOMweb — long-keepalive upstream + nginx disk cache.
        # OHIF fires hundreds of metadata + WADO frame requests per study open.
        # First viewer user pays the cost once; second, third, back-button
        # re-open, etc. are all served from /var/cache/nginx/dicomweb at
        # memory/disk speed (skip Orthanc entirely).
        # proxy_cache_lock coalesces concurrent cache-miss requests for the
        # same URL into one upstream call — prevents stampede.
        # WADO-RS pixel-payload endpoints — force JPEG 2000 Lossless.
        # Orthanc's DicomWeb Transcode=1.2.840.10008.1.2.4.90 only fires when
        # the client sends an Accept that explicitly pins the target transfer
        # syntax; OHIF and Stone both send wildcard by default, so they
        # silently get uncompressed Explicit VR LE and eat ~2x the bytes.
        # Rewriting Accept at the proxy covers both viewers without patching
        # their bundles. Two blocks because Orthanc's WADO-RS expects a
        # different multipart `type` for full-instance vs frame retrieval:
        # "application/dicom" for the DICOM file, "application/octet-stream"
        # for raw pixel frames. Using the wrong one → HTTP 400.
        # Metadata/rendered/thumbnail endpoints fall through to the generic
        # /dicom-web/ block and keep their original Accept.
        location ~* ^/dicom-web/studies/[^/]+/series/[^/]+/instances/[^/]+$ {
            auth_request /__auth_verify_viewer;
            proxy_pass http://orthanc_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header Authorization "Basic ${ORTHANC_BASIC_AUTH}";
            proxy_set_header Accept 'multipart/related; type="application/dicom"; transfer-syntax=1.2.840.10008.1.2.4.90';
            proxy_read_timeout 300s;
            proxy_buffering on;
            proxy_cache dicomweb;
            proxy_cache_key "$request_method$request_uri";
            proxy_cache_valid 200 206 7d;
            proxy_cache_use_stale updating error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_cache_lock off;
            add_header X-Cache-Status $upstream_cache_status always;
            add_header Cache-Control "private, immutable, max-age=604800" always;
        }

        location ~* ^/dicom-web/studies/[^/]+/series/[^/]+/instances/[^/]+/frames/[^/]+$ {
            auth_request /__auth_verify_viewer;
            proxy_pass http://orthanc_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header Authorization "Basic ${ORTHANC_BASIC_AUTH}";
            proxy_set_header Accept 'multipart/related; type="application/octet-stream"; transfer-syntax=1.2.840.10008.1.2.4.90';
            proxy_read_timeout 300s;
            proxy_buffering on;
            proxy_cache dicomweb;
            proxy_cache_key "$request_method$request_uri";
            proxy_cache_valid 200 206 7d;
            proxy_cache_use_stale updating error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_cache_lock off;
            add_header X-Cache-Status $upstream_cache_status always;
            add_header Cache-Control "private, immutable, max-age=604800" always;
        }

        location /dicom-web/ {
            auth_request /__auth_verify_viewer;
            proxy_pass http://orthanc_upstream/dicom-web/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header Authorization "Basic ${ORTHANC_BASIC_AUTH}";
            proxy_read_timeout 300s;
            proxy_buffering on;

            proxy_cache dicomweb;
            proxy_cache_key "$request_method$request_uri";
            # DICOM data is immutable once stored (SOPInstanceUID never changes),
            # so metadata + frames can stay cached for a very long time. 24h
            # keeps the working set warm across a full workweek without growing
            # unbounded (proxy_cache_path max_size=2g caps it).
            proxy_cache_valid 200 206 7d;
            proxy_cache_use_stale updating error timeout invalid_header http_500 http_502 http_503 http_504;
            # proxy_cache_lock OFF — OHIF fires 12+ parallel per-series
            # metadata requests on study open. Each URL is unique (different
            # series UIDs), so the lock offered no coalescing — it just made
            # the browser time out concurrently when Orthanc was slow and
            # nginx held them pending. Let every request fly to upstream;
            # upstream keepalive pool (32) + Orthanc HttpThreadsCount=50
            # comfortably absorb it.
            proxy_cache_lock off;
            add_header X-Cache-Status $upstream_cache_status always;
            add_header Cache-Control "private, immutable, max-age=604800" always;
        }

        # Orthanc REST (backend uses it via docker-network; this is only for
        # OHIF configs that point directly at /orthanc). Same upstream pool.
        #
        # sub_filter rewrites the Orthanc OHIF plugin's dicom-json output.
        # The plugin emits `"url": "dicomweb:../instances/<id>/file"` assuming
        # the JSON is served at Orthanc's REST root, so OHIF would resolve
        # the relative `../` to `/instances/...`. Because we serve it under
        # /orthanc/ via reverse proxy, the relative resolution becomes
        # `/orthanc/studies/instances/<id>/file` — a 404 that shows up in
        # the viewer as "DICM prefix not found". Rewriting to absolute
        # /orthanc/instances/<id>/file makes OHIF fetch the real DICOM blob.
        location /orthanc/ {
            auth_request /__auth_verify_viewer;
            proxy_pass http://orthanc_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header Authorization "Basic ${ORTHANC_BASIC_AUTH}";
            proxy_read_timeout 300s;
            proxy_set_header Accept-Encoding "";
            sub_filter_types application/json;
            sub_filter_once off;
            sub_filter "dicomweb:../instances/" "dicomweb:/orthanc/instances/";
        }

        # Stone Web Viewer (Orthanc official plugin) — native C++/WASM renderer,
        # the default viewer surfaced as "MiniPACS Viewer" in the portal iframe.
        # sub_filter strips Orthanc branding: the CSS rule hides any anchor to
        # orthanc-server.com (top-toolbar logo + modal-popup logos in info/
        # preferences panels), and rewrites the img src so the Orthanc logo
        # disappears even if a browser later renders the hidden link.
        # Runs only on text/html. Accept-Encoding cleared so upstream returns
        # un-gzipped content that sub_filter can actually process.
        location /stone-webviewer/ {
            auth_request /__auth_verify_viewer;
            proxy_pass http://orthanc_upstream/stone-webviewer/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header Authorization "Basic ${ORTHANC_BASIC_AUTH}";
            proxy_read_timeout 300s;
            proxy_set_header Accept-Encoding "";
            sub_filter_once on;
            sub_filter '</head>' '<style>a[href*="orthanc-server.com"]{display:none!important}</style></head>';
        }

        # OHIF viewer — Orthanc's native plugin is now THE viewer.
        # Custom OHIF bundle was removed from the image; plugin serves the
        # same OHIF SPA but reads study metadata from a precomputed SQLite
        # attachment (dicom-json datasource) instead of re-reading every
        # .dcm file from disk. Cold-open drops from 20-30s to 1-3s.
        location /ohif/ {
            auth_request /__auth_verify_viewer;
            proxy_pass http://orthanc_upstream/ohif/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header Authorization "Basic ${ORTHANC_BASIC_AUTH}";
            proxy_read_timeout 300s;
        }
    }
}
