worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 65;
    keepalive_requests 200;

    # Persistent upstream connections — without this nginx opens a fresh TCP
    # socket to Orthanc/backend for every request, adding ~1 RTT per call. OHIF
    # fires ~200 DICOMweb metadata requests per study; re-using sockets cuts
    # total latency substantially.
    upstream orthanc_upstream {
        server orthanc:8042;
        keepalive 32;
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }
    upstream backend_upstream {
        server backend:8000;
        keepalive 16;
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }

    # Compression — gzip_static serves pre-compressed .gz files produced by the
    # frontend build (vite-plugin-compression). Falls back to on-the-fly gzip
    # for dynamic responses.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        application/javascript application/json application/xml
        text/css text/javascript text/plain text/xml
        image/svg+xml font/woff font/woff2;
    gzip_static on;

    server {
        listen 80;
        server_name _;

        client_max_body_size 500M;

        # Security headers
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://www.google.com https://*.gstatic.com; font-src 'self' data:; connect-src 'self'; frame-src 'self'; media-src 'self'; object-src 'none';" always;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

        # React frontend — hashed assets immutable, index.html always revalidated.
        # Without this, a Cloudflare DYNAMIC pass-through + browser heuristic
        # can keep stale index.html pointing at a dead bundle hash after a rebuild.
        location = /index.html {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
        }

        location /assets/ {
            root /usr/share/nginx/html;
            access_log off;
            expires 1y;
            add_header Cache-Control "public, immutable, max-age=31536000" always;
            try_files $uri =404;
        }

        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # FastAPI backend — keepalive upstream for request bursts
        location /api/ {
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Orthanc DICOMweb — long-keepalive upstream. OHIF fires hundreds of
        # metadata requests per study open; reusing the same Orthanc socket
        # instead of TCP-handshaking each one is a huge win.
        # Metadata responses are cacheable at the browser — Orthanc's study
        # metadata only changes when a new instance is stored, and the series
        # cache inside Orthanc already dedupes computation.
        location /dicom-web/ {
            proxy_pass http://orthanc_upstream/dicom-web/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header Authorization "Basic ${ORTHANC_BASIC_AUTH}";
            proxy_read_timeout 300s;
            proxy_buffering on;
            # Cache metadata GETs in the browser for a minute — safe because
            # metadata only changes when new instances arrive; mutators bust it.
            add_header Cache-Control "private, max-age=60" always;
        }

        # Orthanc REST (backend uses it via docker-network; this is only for
        # OHIF configs that point directly at /orthanc). Same upstream pool.
        location /orthanc/ {
            proxy_pass http://orthanc_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header Authorization "Basic ${ORTHANC_BASIC_AUTH}";
            proxy_read_timeout 300s;
        }

        # OHIF Viewer
        location /ohif/ {
            alias /usr/share/nginx/ohif/;
            try_files $uri $uri/ /ohif/index.html;
        }
    }
}
