x-logging: &default-logging
  driver: json-file
  options:
    max-size: "100m"
    max-file: "3"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    # Shared QIDO cache across uvicorn workers. Internal only, no host port.
    # No persistence — Redis is a derived cache; Orthanc is the source of truth.
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 10

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    # Preload pg_stat_statements so we can diagnose slow queries on demand
    # (track=all covers nested calls + utility statements). Cost: a fixed
    # ~16 MB shared_buffer slot per server, negligible on this workload.
    # Mirrors docker-compose.yml — backend's init_db CREATE EXTENSION needs
    # this preload or it fails on startup right after the TIMESTAMPTZ
    # migration block.
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
      - -c
      - pg_stat_statements.max=5000
    volumes:
      - orthanc-pg:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: orthanc
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: orthanc
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orthanc -d orthanc"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  orthanc:
    image: orthancteam/orthanc
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - orthanc-data:/var/lib/orthanc/db
      - ./orthanc/orthanc-docker.json:/etc/orthanc/orthanc.json:ro
      - ./orthanc/lua:/etc/orthanc/lua:ro
      - ./orthanc/python:/etc/orthanc/python:ro
      - minipacs-thumbs:/var/cache/minipacs-thumbs
      - ./orthanc/ohif-user-config.js:/etc/orthanc/ohif-user-config.js:ro
    environment:
      ORTHANC_USERNAME: "${ORTHANC_USERNAME:-orthanc}"
      ORTHANC_PASSWORD: "${ORTHANC_PASSWORD}"
      ORTHANC__REGISTERED_USERS: '{"${ORTHANC_USERNAME:-orthanc}":"${ORTHANC_PASSWORD}"}'
      # Live-worklist WS: plugin notifies backend on STABLE_STUDY.
      BACKEND_EVENT_URL: "http://backend:8000/api/internal/events/new-study"
      INTERNAL_EVENT_TOKEN: "${INTERNAL_EVENT_TOKEN}"
      DICOM_WEB_PLUGIN_ENABLED: "true"
      TRANSFERS_PLUGIN_ENABLED: "true"
      STONE_WEB_VIEWER_PLUGIN_ENABLED: "true"
      OHIF_PLUGIN_ENABLED: "true"
      # PostgreSQL index. EnableStorage stays false — DICOM files remain on
      # disk under orthanc-data. PG only holds the SQLite-replacement index.
      # On first start with an existing SQLite index in the volume, the plugin
      # auto-migrates it into PG (one-shot, minutes). Subsequent restarts
      # use PG exclusively — SQLite files in the volume are ignored.
      POSTGRESQL_PLUGIN_ENABLED: "true"
      POSTGRESQL_HOST: postgres
      POSTGRESQL_PORT: "5432"
      POSTGRESQL_DATABASE: orthanc
      POSTGRESQL_USERNAME: orthanc
      POSTGRESQL_PASSWORD: "${POSTGRES_PASSWORD}"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "48924:4242"  # DICOM C-STORE/C-ECHO (LAN + internet via port forward)
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.create_connection(('localhost',8042),2); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - minipacs-db:/app/data
      - ./scripts:/app/scripts:ro
      # rw because the backend now persists resized WebP siblings next to
      # the plugin's source PNGs so a backend restart skips the expensive
      # Pillow resize on every study (tier-2 hit in _load_thumb).
      - minipacs-thumbs:/srv/thumbs
    environment:
      SECRET_KEY: "${SECRET_KEY}"
      ORTHANC_URL: "http://orthanc:8042"
      ORTHANC_USERNAME: "${ORTHANC_USERNAME:-orthanc}"
      ORTHANC_PASSWORD: "${ORTHANC_PASSWORD}"
      REDIS_URL: "redis://redis:6379/0"
      DATABASE_URL: "postgresql://orthanc:${POSTGRES_PASSWORD}@postgres:5432/orthanc"
      DATABASE_PATH: "/app/data/minipacs.db"
      INTERNAL_EVENT_TOKEN: "${INTERNAL_EVENT_TOKEN}"
      CORS_ORIGINS: '["https://${DOMAIN}","http://${DOMAIN}","http://localhost"]'
      AUTO_LOGOUT_MINUTES: "${AUTO_LOGOUT_MINUTES:-15}"
      DEFAULT_SHARE_EXPIRY_DAYS: "${DEFAULT_SHARE_EXPIRY_DAYS:-30}"
      # DICOM endpoint shown to external senders in the "Receiving DICOM Studies"
      # info card. CF tunnel only carries HTTP, so this must be the public IP
      # where the router forwards TCP 48924, not the CF hostname.
      DICOM_PUBLIC_HOST: "${DICOM_PUBLIC_HOST:-}"
      DICOM_PUBLIC_PORT: "${DICOM_PUBLIC_PORT:-48924}"
      DICOM_AET: "${DICOM_AET:-MINIPACS}"
    depends_on:
      orthanc:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "127.0.0.1:8080:80"  # HTTP only — CF Tunnel connects here
      # LAN-facing HTTPS for split-horizon DNS (UniFi → pacs.your-clinic.example
      # points at the clinic LAN IP internally). HTTP/2 multiplexes Stone bursts;
      # ~1ms RTT on LAN vs ~50-100ms through CF Tunnel on intermittent WAN.
      - "443:443"
    volumes:
      - nginx-cache:/var/cache/nginx
      # SSL certificates:
      # The image bakes a self-signed pair at /etc/ssl/minipacs/ so the 443
      # listener always boots. To serve a real Cloudflare Origin Certificate
      # instead, COPY `docker-compose.override.yml.example` →
      # `docker-compose.override.yml`, drop cert.pem + key.pem into ./ssl/,
      # and re-run `up -d`. The override mounts the individual files on top
      # of the baked pair and fails loudly at up-time if either is missing.
      # We deliberately DON'T mount ./ssl here — a missing host directory
      # would silently get auto-created empty and shadow the baked fallback,
      # breaking nginx on a fresh install.
    environment:
      ORTHANC_BASIC_AUTH: "${ORTHANC_BASIC_AUTH}"
      HTTPS_PORT: "443"
      NGINX_TEMPLATE: "nginx-prod"
    depends_on:
      - backend
      - orthanc

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    logging: *default-logging
    command: tunnel run
    environment:
      TUNNEL_TOKEN: "${CF_TUNNEL_TOKEN}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - frontend

volumes:
  orthanc-data:
  orthanc-pg:
  minipacs-db:
  nginx-cache:
  minipacs-thumbs:
